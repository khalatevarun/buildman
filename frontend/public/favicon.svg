<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Triskelion: 3 curved axe blades spinning 120° apart -->
  <circle cx="50" cy="50" r="50" fill="#000"/>
  <g fill="#fff">
    <path d="M 50,50 C 46,42 44,32 45,20 Q 50,12 58,18 Q 65,26 62,36 Q 58,44 50,50 Z"/>
    <path d="M 50,50 C 46,42 44,32 45,20 Q 50,12 58,18 Q 65,26 62,36 Q 58,44 50,50 Z" transform="rotate(120 50 50)"/>
    <path d="M 50,50 C 46,42 44,32 45,20 Q 50,12 58,18 Q 65,26 62,36 Q 58,44 50,50 Z" transform="rotate(240 50 50)"/>
    <!-- small center dot to unify the arms -->
    <circle cx="50" cy="50" r="4"/>
  </g>
</svg>
